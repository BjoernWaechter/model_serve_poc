apiVersion: "serving.kserve.io/v1beta1"
kind: "InferenceService"
metadata:
  name: "forest"
  namespace: team-a
spec:
  predictor:
    serviceAccountName: kserve-sa
    annotations:
      prometheus.kserve.io/port: "8080"
      prometheus.kserve.io/path: /metrics
    minReplicas: 2
    maxReplicas: 5
    model:
      modelFormat:
        name: sklearn
      storageUri: "<model-storage-uri>"
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"