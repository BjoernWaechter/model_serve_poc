apiVersion: ray.io/v1
kind: RayService
metadata:
  name: text-summarizer
spec:
  serveConfigV2: |
    applications:
      - name: text_summarizer
        import_path: text_summarizer.text_summarizer:deployment
        runtime_env:
          working_dir: "s3://ray-ap-southeast-2/607d1264c2c998e4a85eaf5403efcd3bc9ed3039.zip"
        deployments:
          # Must match the class name in text_summarizer.py (SummaryDeployment),
          # since the @serve.deployment decorator has no explicit name= kwarg.
          - name: SummaryDeployment
            autoscaling_config:
              metrics_interval_s: 0.2
              min_replicas: 0
              max_replicas: 14
              look_back_period_s: 2
              downscale_delay_s: 5
              upscale_delay_s: 2
              target_ongoing_requests: 1
            graceful_shutdown_timeout_s: 5
            ray_actor_options:
              num_cpus: 0.5
              # Keep num_gpus from the decorator — ray_actor_options overrides
              # replace the whole dict, so we must re-declare it here.
              num_gpus: 1
  rayClusterConfig:
    rayVersion: '2.46.0' # Should match the Ray version in the image of the containers
    enableInTreeAutoscaling: true
    autoscalerOptions:
      version: v2
      upscalingMode: Default
      idleTimeoutSeconds: 60
      imagePullPolicy: IfNotPresent
      # Optionally specify the Autoscaler container's securityContext.
      securityContext: {}
      env: []
      # AUTOSCALER_UPDATE_INTERVAL_S is used to control how often the Autoscaler container checks the cluster state
      # and decides whether to request scaling the cluster up or down. The default value is 5 seconds.
      # - name: AUTOSCALER_UPDATE_INTERVAL_S
      #   value: "5"
      # RAY_LOGGER_LEVEL is used to control autoscaler and ray logging verbosity (info|debug|warning|error|critical). The default value is "info".
      # - name: RAY_LOGGER_LEVEL
      #   value: "debug"
      envFrom: []
      resources:
        limits:
          cpu: "500m"
          memory: "512Mi"
        requests:
          cpu: "500m"
          memory: "512Mi"
    ######################headGroupSpecs#################################
    # Ray head pod template.
    headGroupSpec:
      rayStartParams: {}
      # Pod template
      template:
        spec:
          containers:
          - name: ray-head
            image: 768871556035.dkr.ecr.ap-southeast-2.amazonaws.com/ray-ml:2.46.0.0e19ea-py39-gpu
            volumeMounts:
            - mountPath: /tmp/ray
              name: ray-logs
            resources:
              limits:
                cpu: "2"
                memory: "8Gi"
              requests:
                cpu: "2"
                memory: "8Gi"
          volumes:
          - name: ray-logs
            emptyDir: {}
    workerGroupSpecs:
    # The pod replicas in this group typed worker
    - replicas: 1
      minReplicas: 1
      maxReplicas: 10
      groupName: gpu-group
      rayStartParams: {}
      # Pod template
      template:
        spec:
          containers:
          - name: ray-worker
            image: 768871556035.dkr.ecr.ap-southeast-2.amazonaws.com/ray-ml:2.46.0.0e19ea-py39-gpu
            resources:
              limits:
                cpu: "3"
                memory: "16Gi"
                nvidia.com/gpu: "1"
              requests:
                cpu: "2"
                memory: "12Gi"
                nvidia.com/gpu: "1"
          # Tolerate the taint applied by the Karpenter GPU NodePool
          # (karpenter.tf -> nvidia.com/gpu=true:NoSchedule). The
          # workload=gpu toleration is kept for backwards-compat with
          # any legacy node labels.
          tolerations:
          - key: "nvidia.com/gpu"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
          - key: "workload"
            operator: "Equal"
            value: "gpu"
            effect: "NoSchedule"
